name: Test post
permissions:
  contents: write
  pages: write

on:
  workflow_dispatch:
    inputs:
      post_on_slack:
        description: "Post on Slack"
        type: boolean
        required: false
        default: false

jobs:
  post-menus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        run: npm i

      - name: Generate static page
        if: ${{ inputs.post_on_slack == false }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run page

      - name: Post menus to Slack and generate static page
        if: ${{ inputs.post_on_slack == true }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.TEST_SLACK_CHANNEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAPY_API_KEY: ${{ secrets.MAPY_API_KEY }}
        run: npm run all

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true